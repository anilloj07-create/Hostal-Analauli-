<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Hotel</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .login-box {
            background: linear-gradient(to bottom, #FFFFFF, #FFFBF8);
            border: 2px solid #FFE5D9;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(var(--color-primary-rgb), 0.4),
                        0 5px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            animation: slideDown 0.5s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: var(--color-primary);
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(var(--color-primary-rgb), 0.2);
        }

        .login-header p {
            color: var(--color-heading);
            font-size: 1em;
            margin: 0;
        }

        .login-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .login-form {
            margin-top: 30px;
        }

        .form-group-login {
            margin-bottom: 25px;
        }

        .form-group-login label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-heading);
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group-login input {
            width: 100%;
            padding: 14px;
            border: 2px solid #FFE5D9;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
            background: white;
            box-sizing: border-box;
        }

        .form-group-login input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb), 0.1);
            transform: translateY(-2px);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-mid) 50%, var(--color-primary-light) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(var(--color-primary-rgb), 0.4);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(var(--color-primary-rgb), 0.5);
            background: linear-gradient(135deg, var(--color-primary-mid) 0%, var(--color-primary-light) 50%, #ffc066 100%);
        }

        .btn-login:active {
            transform: translateY(-1px) scale(1);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: linear-gradient(135deg, #FFCDD2 0%, #FFB3BA 100%);
            color: #C62828;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #EF9A9A;
            font-size: 0.9em;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .login-box {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-icon">🏨</div>
                <h1 id="loginHotelNombre">Mi Hotel</h1>
                <p class="login-subtitulo">Inicie sesión para continuar</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group-login">
                    <label for="username">Usuario</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        autocomplete="username"
                        placeholder="Ingrese su usuario"
                        autofocus
                    >
                </div>

                <div class="form-group-login">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        autocomplete="current-password"
                        placeholder="Ingrese su contraseña"
                    >
                </div>

                <button type="submit" class="btn-login" id="loginButton">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <script src="theme-apply.js?v=4"></script>
    <script>
        const API_URL = `${window.location.origin}/api`;

        async function obtenerNombreHotelPublico() {
            try {
                const r = await fetch(`${API_URL}/hotel/nombre`, { cache: 'no-store' });
                if (r.ok) {
                    const d = await r.json();
                    const n = d && d.nombre != null ? String(d.nombre).trim() : '';
                    if (n) return n;
                }
            } catch (e) {
                console.warn('No se pudo cargar /hotel/nombre:', e);
            }
            return null;
        }

        async function aplicarTemaDesdeServidor() {
            let data = {};
            try {
                const response = await fetch(`${API_URL}/hotel/apariencia`, { cache: 'no-store' });
                if (response.ok) {
                    data = await response.json();
                }
            } catch (error) {
                console.error('Error al cargar apariencia:', error);
            }
            if (!data.nombre || !String(data.nombre).trim()) {
                const nombreBd = await obtenerNombreHotelPublico();
                if (nombreBd) {
                    data.nombre = nombreBd;
                }
            }
            if (typeof TemaHotel !== 'undefined') {
                TemaHotel.aplicarMarcaHotel(document, data);
            } else {
                const nombre = (data && data.nombre) ? String(data.nombre).trim() : 'Mi Hotel';
                const h1 = document.getElementById('loginHotelNombre');
                if (h1) h1.textContent = nombre;
                document.title = nombre;
            }
        }

        // Verificar si ya está autenticado
        async function checkAuth() {
            try {
                const response = await fetch(`${API_URL}/auth/check`, {
                    credentials: 'include'
                });
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = '/index.html';
                }
            } catch (error) {
                console.error('Error al verificar autenticación:', error);
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');
            const errorMessage = document.getElementById('errorMessage');
            
            // Ocultar mensaje de error
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
            
            // Deshabilitar botón y mostrar loading
            loginButton.disabled = true;
            loginButton.innerHTML = '<span class="loading"></span>Iniciando sesión...';
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.location.href = '/index.html';
                } else {
                    errorMessage.textContent = data.error || 'Error al iniciar sesión';
                    if (response.status === 403) {
                        errorMessage.textContent +=
                            ' Si acaba de crear la cuenta, pida al administrador que verifique que no esté anulada en Configuración.';
                    }
                    errorMessage.classList.add('show');
                    loginButton.disabled = false;
                    loginButton.textContent = 'Iniciar Sesión';
                }
            } catch (error) {
                errorMessage.textContent = 'Error de conexión. Verifique que el servidor esté corriendo.';
                errorMessage.classList.add('show');
                loginButton.disabled = false;
                loginButton.textContent = 'Iniciar Sesión';
            }
        }

        // Cargar colores públicos primero y luego comprobar sesión
        (async function inicializarPaginaLogin() {
            if (typeof TemaHotel !== 'undefined') {
                TemaHotel.aplicarNombreDesdeStorage(document);
            } else {
                try {
                    const n = localStorage.getItem('hotelNombreMarca');
                    if (n) {
                        const h1 = document.getElementById('loginHotelNombre');
                        if (h1) h1.textContent = n;
                        document.title = n;
                    }
                } catch (_) { /* ignore */ }
            }
            await aplicarTemaDesdeServidor();
            const aviso = sessionStorage.getItem('loginAviso');
            if (aviso) {
                sessionStorage.removeItem('loginAviso');
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.textContent =
                    aviso === 'Cuenta desactivada' || aviso === 'Cuenta anulada'
                        ? 'Su sesión terminó porque la cuenta fue anulada. Contacte a un administrador para reactivarla.'
                        : aviso;
                errorMessage.classList.add('show');
            }
            checkAuth();
        })();

        // Permitir envío con Enter
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
